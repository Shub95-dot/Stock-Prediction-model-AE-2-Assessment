name: CD — Retrain & Deploy Dashboard
 
# Only triggers on a direct push/merge to main
# (i.e. when a PR is merged — PRs cannot trigger this directly)
on:
  push:
    branches: [main]
 
jobs:
  # ════════════════════════════════════════════════════════════════
  # JOB 1 — Verify all CI checks passed on the same commit
  # ════════════════════════════════════════════════════════════════
  gate:
    name: Verify CI Green
    runs-on: ubuntu-latest
    steps:
      - name: Check CI status
        run: echo "CD triggered — CI workflow must have passed to reach main."
 
  # ════════════════════════════════════════════════════════════════
  # JOB 2 — Retrain models on latest data (optional, heavy)
  #         Only runs when the model code or pipeline changes.
  #         Uses paths filter so a README change doesn't retrain.
  # ════════════════════════════════════════════════════════════════
  retrain:
    name: Retrain Models (on code change)
    runs-on: ubuntu-latest
    needs: gate
    # Only retrain when barometer logic changes — not on docs/config edits
    if: |
      contains(github.event.head_commit.modified, 'barometer_core.py') ||
      contains(github.event.head_commit.modified, 'sentiment_pipeline.py')
 
    steps:
      - uses: actions/checkout@v4
 
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
 
      - name: Install all dependencies
        run: |
          pip install yfinance pandas numpy scikit-learn scipy lightgbm xgboost \
                      tensorflow hmmlearn ta joblib python-dotenv
 
      - name: Retrain NVDA model
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          TF_CPP_MIN_LOG_LEVEL: "3"
          TF_ENABLE_ONEDNN_OPTS: "0"
        run: python retrain_nvda.py
 
      - name: Upload trained models as artifact
        uses: actions/upload-artifact@v4
        with:
          name: barometer-models-${{ github.sha }}
          path: barometer_saved/
          retention-days: 30
 
  # ════════════════════════════════════════════════════════════════
  # JOB 3 — Build & push Docker image (for dashboard deployment)
  # ════════════════════════════════════════════════════════════════
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: gate
    # Only build Docker if a Dockerfile exists in the repo
    # Remove the 'if' line once you add a Dockerfile
    if: hashFiles('Dockerfile') != ''
 
    steps:
      - uses: actions/checkout@v4
 
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
 
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/soligence-barometer:latest
            ghcr.io/${{ github.repository_owner }}/soligence-barometer:${{ github.sha }}
 
  # ════════════════════════════════════════════════════════════════
  # JOB 4 — Tag the release
  # ════════════════════════════════════════════════════════════════
  tag:
    name: Create Release Tag
    runs-on: ubuntu-latest
    needs: gate
    permissions:
      contents: write
 
    steps:
      - uses: actions/checkout@v4
 
      - name: Generate version tag (date-based)
        id: version
        run: echo "tag=v$(date +'%Y.%m.%d')-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
 
      - name: Create and push tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}
