name: CI — Lint, Test, Validate
 
# Triggers: every push and every pull request to main or develop
on:
  push:
    branches: ["**"]          # all branches
  pull_request:
    branches: [main, develop]
 
jobs:
  # ════════════════════════════════════════════════════════════════
  # JOB 1 — Code quality (fast, runs in ~30s)
  # ════════════════════════════════════════════════════════════════
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
 
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
 
      - name: Install linting tools
        run: pip install flake8 black mypy
 
      - name: Check formatting with black (non-destructive)
        run: black --check --diff .
 
      - name: Lint with flake8
        # E501 = line too long (relaxed for ML files), W503 = line break before binary op
        run: flake8 . --max-line-length=120 --extend-ignore=E501,W503 --exclude=.venv,__pycache__
 
  # ════════════════════════════════════════════════════════════════
  # JOB 2 — Unit + integration tests
  # ════════════════════════════════════════════════════════════════
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint          # only run if lint passes
 
    steps:
      - uses: actions/checkout@v4
 
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
 
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance pandas numpy scikit-learn scipy lightgbm xgboost \
                      tensorflow hmmlearn ta joblib python-dotenv pytest pytest-cov
 
      - name: Run tests with coverage
        env:
          # Sentinel values so tests run without real API keys
          NEWSAPI_KEY: "test_key"
          REDDIT_CLIENT_ID: "test_id"
          REDDIT_CLIENT_SECRET: "test_secret"
          TF_CPP_MIN_LOG_LEVEL: "3"
          TF_ENABLE_ONEDNN_OPTS: "0"
        run: |
          pytest tests/ -v --cov=barometer_core --cov-report=xml --cov-report=term-missing
 
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false     # don't fail CI if Codecov is unavailable
 
  # ════════════════════════════════════════════════════════════════
  # JOB 3 — Feature pipeline smoke test (no models, just data)
  # ════════════════════════════════════════════════════════════════
  pipeline-smoke:
    name: DataPipeline Smoke Test
    runs-on: ubuntu-latest
    needs: lint
 
    steps:
      - uses: actions/checkout@v4
 
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
 
      - name: Install dependencies
        run: |
          pip install yfinance pandas numpy scikit-learn scipy lightgbm xgboost \
                      tensorflow hmmlearn ta joblib python-dotenv
 
      - name: Run pipeline smoke test
        env:
          TF_CPP_MIN_LOG_LEVEL: "3"
          TF_ENABLE_ONEDNN_OPTS: "0"
        run: python tests/smoke_pipeline.py